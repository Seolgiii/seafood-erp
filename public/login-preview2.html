  body { font-family: 'Noto Sans KR', sans-serif; background: #e5e7eb; }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .slide-up { animation: slideUp 0.32s cubic-bezier(0.32,0.72,0,1) both; }

  @keyframes dotPop {
    0%   { transform: scale(0.5); }
    65%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .dot-pop { animation: dotPop 0.18s ease both; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-6px); }
    40%       { transform: translateX(6px); }
    60%       { transform: translateX(-4px); }
    80%       { transform: translateX(4px); }
  }
  .shake { animation: shake 0.38s ease both; }
</style>

<script>
// ── 공통 헬퍼 ──
function makePin(id) {
  return {
    val: '',
    color: '#191F28',
    update() {
      const dots = document.querySelectorAll(`#${id}-dots div`);
      dots.forEach((d, i) => {
        if (i < this.val.length) {
          d.style.backgroundColor = this.color;
          d.classList.add('dot-pop');
        } else {
          d.style.backgroundColor = '#E5E8EB';
          d.classList.remove('dot-pop');
        }
      });
    },
    flash(errMsg) {
      this.val = '';
      this.update();
      const dots = document.querySelectorAll(`#${id}-dots div`);
      dots.forEach(d => { d.style.backgroundColor = '#FF3B30'; });
      const errEl = document.getElementById(`${id}-err`);
      if (errEl) errEl.textContent = errMsg;
      const dotsWrap = document.getElementById(`${id}-dots`);
      dotsWrap.classList.add('shake');
      setTimeout(() => {
        dotsWrap.classList.remove('shake');
        this.update();
      }, 400);
    }
  };
}

// ── A ──
const pA = makePin('A');
let aWorker = null;
function openA(idx, name, color) {
  aWorker = { name, color };
  pA.val = ''; pA.color = '#191F28'; pA.update();
  document.getElementById('A-err').textContent = '';
  document.getElementById('A-avatar').textContent = name[0];
  document.getElementById('A-avatar').style.backgroundColor = color;
  document.getElementById('A-name').textContent = name;
  const ol = document.getElementById('A-overlay');
  ol.classList.remove('hidden'); ol.classList.add('flex');
}
function closeA() {
  const ol = document.getElementById('A-overlay');
  ol.classList.add('hidden'); ol.classList.remove('flex');
  pA.val = '';
}
function tapA(n) {
  if (pA.val.length >= 4) return;
  pA.val += n; pA.update();
  if (pA.val.length === 4) setTimeout(() => {
    if (pA.val === '1234') { document.getElementById('A-err').textContent = '✓ 로그인 성공!'; document.getElementById('A-err').style.color='#00D082'; setTimeout(closeA, 700); }
    else pA.flash('PIN이 올바르지 않습니다');
  }, 100);
}
function backA() { if (pA.val.length) { pA.val = pA.val.slice(0,-1); pA.update(); } }
function clearA() { pA.val = ''; pA.update(); }
